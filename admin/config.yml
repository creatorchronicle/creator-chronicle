backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string", default: "Captain Tella"}
      - {label: "Date", name: "date", widget: "datetime"}
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Music", "Skits", "TikTok", "Creator Economy", "Industry", "Afrobeats"]
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
